<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil — DetectorGranizo</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <style>
        .profile-card {
            max-width: 480px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 40px 40px 36px;
            box-shadow: 0 2px 16px rgba(44,24,16,0.09);
        }
        .profile-avatar-big {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #8B5E3C, #D4A853);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
            margin: 0 auto 20px;
            box-shadow: 0 3px 12px rgba(44,24,16,0.18);
        }
        .profile-card h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 20px;
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 18px;
        }
        .profile-field label {
            font-size: 12px;
            font-weight: 700;
            color: var(--musgo-dark);
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }
        .profile-field input {
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            background: var(--crema);
            color: var(--t-dark);
            transition: border-color 0.18s;
            outline: none;
        }
        .profile-field input:focus { border-color: var(--musgo); }
        .profile-divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }
        .profile-section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 16px;
        }
        .profile-save-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--musgo-dark), var(--musgo));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 3px 10px rgba(45,74,34,0.22);
        }
        .profile-save-btn:hover  { opacity: 0.9; }
        .profile-save-btn:active { transform: scale(0.98); }
        .profile-msg {
            text-align: center;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 18px;
        }
        .profile-msg.ok    { background: rgba(74,124,63,0.12); color: var(--musgo-dark); border: 1px solid rgba(74,124,63,0.25); }
        .profile-msg.error { background: rgba(192,57,43,0.10); color: #7a0000; border: 1px solid rgba(192,57,43,0.25); }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 24px;
            transition: color 0.18s;
        }
        .back-link:hover { color: var(--musgo); }
        .profile-hint {
            font-size: 11px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            color: var(--text-soft);
        }
    </style>
</head>
<body>

<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menú">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<nav class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/main">
        <div class="sidebar-logo-icon">🌾</div>
        <div class="sidebar-logo-text">
            <span class="sidebar-logo-title">DetectorGranizo</span>
            <span class="sidebar-logo-subtitle">Gestión agrícola</span>
        </div>
    </a>
    <div class="sidebar-nav">
        <div class="sidebar-section-label">Principal</div>
        <a href="/main" class="sidebar-link">
            <span class="nav-icon">🏡</span>
            <span class="nav-label">Mis terrenos</span>
        </a>
        <a href="/field/new" class="sidebar-link">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Añadir terreno</span>
        </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-footer">
        <a href="/profile" class="sidebar-user" style="text-decoration:none;">
            <div class="sidebar-avatar" title="Editar perfil">👤</div>
            <div>
                <div class="sidebar-username">{{ current_user.name or current_user.email }}</div>
                <div class="sidebar-role">Agricultor</div>
            </div>
        </a>
        <a href="/" class="sidebar-logout">
            <span class="nav-icon">🚪</span>
            <span class="nav-label">Cerrar sesión</span>
        </a>
    </div>
</nav>

<div class="main-content">
    <a href="/main" class="back-link">← Volver al dashboard</a>

    <div class="profile-card">
        <div class="profile-avatar-big">👤</div>
        <h2>Mi perfil</h2>

        {% if msg %}
            <div class="profile-msg {{ msg_type }}">{{ msg }}</div>
        {% endif %}

        <form method="post" action="/profile" id="profile-form">

            <!-- ── DATOS PERSONALES ── -->
            <div class="profile-section-title">Datos personales</div>

            <div class="profile-field">
                <label>Nombre</label>
                <input type="text" name="name" value="{{ current_user.name or '' }}" required>
            </div>

            <div class="profile-field">
                <label>Email</label>
                <input type="email" name="email" value="{{ current_user.email }}" required>
            </div>

            <div class="profile-divider"></div>

            <!-- ── CONTRASEÑA ── -->
            <div class="profile-section-title">
                Cambiar contraseña
                <span class="profile-hint">(dejar en blanco para no cambiar)</span>
            </div>

            <div class="profile-field">
                <label>Contraseña actual</label>
                <input type="password" name="current_password" id="current_password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="profile-field">
                <label>Nueva contraseña</label>
                <input type="password" name="new_password" id="new_password" placeholder="••••••••" autocomplete="new-password">
            </div>

            <div class="profile-field">
                <label>Confirmar nueva contraseña</label>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" autocomplete="new-password">
            </div>

            <button type="submit" class="profile-save-btn">Guardar cambios</button>
        </form>
    </div>
</div>

<script>
(function () {
    // Toggle sidebar
    const toggle  = document.getElementById("sidebar-toggle");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    if (toggle) {
        toggle.addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("show"); });
        overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); });
    }

    // Validación de contraseñas en cliente antes de enviar
    document.getElementById("profile-form").addEventListener("submit", function (e) {
        const newPwd     = document.getElementById("new_password").value;
        const confirmPwd = document.getElementById("confirm_password").value;
        const currentPwd = document.getElementById("current_password").value;

        // Si se quiere cambiar contraseña, los tres campos son obligatorios
        if (newPwd || confirmPwd || currentPwd) {
            if (!currentPwd) {
                e.preventDefault();
                alert("Debes introducir tu contraseña actual para cambiarla.");
                return;
            }
            if (!newPwd) {
                e.preventDefault();
                alert("Introduce la nueva contraseña.");
                return;
            }
            if (newPwd !== confirmPwd) {
                e.preventDefault();
                alert("La nueva contraseña y su confirmación no coinciden.");
                return;
            }
        }
    });
})();
</script>
</body>
</html>
